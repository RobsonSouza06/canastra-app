<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Canastra Score</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<h1>🃏 Canastra Score</h1>

<div class="card">
  <input type="number" id="target" placeholder="Pontuação para vencer (ex: 3000)">
</div>

<div class="card">
  <h2>Duplas</h2>
  <input type="text" id="name" placeholder="Nome da dupla">
  <button onclick="addPlayer()">Adicionar</button>
</div>

<!-- PLACAR EM COLUNAS -->
<div class="score-board" id="scoreBoard"></div>

<div class="card">
  <h2>Nova Rodada</h2>
  <div id="roundInputs"></div>
  <button onclick="addRound()">Adicionar Rodada</button>
</div>

<div class="card">
  <h2>Rodadas</h2>
  <ul id="rounds"></ul>
</div>

<button class="reset" onclick="resetGame()">🔄 Reiniciar Jogo</button>

</div>

<script src="script.js"></script>

</body>
</html>
