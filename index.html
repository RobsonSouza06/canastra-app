<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Canastra">
  <link rel="manifest" href="/canastra-app/manifest.json">
  <title>Canastra Score</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="app-header">
    <span class="app-icon">🃏</span>
    <h1>Contador de Pontos Canastra</h1>
  </header>

  <!-- BARRA DE AÇÕES RÁPIDAS -->
  <div class="action-bar">
    <button class="btn-action" onclick="openHistoryModal()">📊 Ver Histórico</button>
    <button class="btn-action btn-action-admin" onclick="openAdminModal()">⚙️ Admin</button>
  </div>

  <!-- SETUP (visível antes de jogar) -->
  <div id="setup-section">

    <section class="card">
      <p class="card-label">Pontuação para vencer</p>
      <input type="number" id="target" placeholder="Ex: 3000" inputmode="numeric">
    </section>

    <!-- DUPLAS DEFAULT -->
    <section class="card" id="default-teams"></section>

    <section class="card">
      <p class="card-label">Ou adicione uma dupla diferente</p>
      <div class="input-row">
        <input type="text" id="name" placeholder="Nome da dupla">
        <button class="btn-add" onclick="addPlayer()">+</button>
      </div>
    </section>

    <div id="scoreBoard-setup" class="score-board"></div>

    <section id="btn-jogar-section" style="display:none">
      <button class="btn btn-jogar" onclick="startGame()">▶ Jogar</button>
    </section>
  </div>

  <!-- JOGO (visível durante a partida) -->
  <div id="game-section" style="display:none">

    <!-- PÓS JOGO -->
    <section id="postgame-section" style="display:none">
      <div class="postgame-banner">
        <p class="postgame-label">🏆 Partida encerrada! O que deseja fazer?</p>
        <button class="btn btn-primary" onclick="rematchSameScore()">🔁 Mesmas duplas, mesma pontuação</button>
        <button class="btn btn-warning" onclick="rematchNewScore()">🎯 Mesmas duplas, pontuação diferente</button>
        <button class="btn btn-new-players" onclick="newPlayersGame()">👥 Novos jogadores</button>
      </div>
      <div id="new-score-section" style="display:none" class="card">
        <p class="card-label">Nova pontuação para vencer</p>
        <input type="number" id="new-target" placeholder="Ex: 3000" inputmode="numeric">
        <button class="btn btn-jogar" onclick="rematchWithNewScore()" style="margin-top:12px">▶ Jogar</button>
      </div>
    </section>

    <div id="scoreBoard" class="score-board"></div>

    <section id="round-section">
      <button class="btn btn-primary" onclick="openRoundModal()">＋ Adicionar Rodada</button>
    </section>

    <section class="card" id="rounds-section" style="display:none">
      <p class="card-label">Rodadas</p>
      <ul id="rounds" class="round-list"></ul>
    </section>

    <button class="btn btn-reset" onclick="resetGame()">🔄 Reiniciar Jogo</button>

  </div>

  <!-- HISTÓRICO RÁPIDO (últimas 5) -->
  <section class="card">
    <div class="history-header">
      <p class="card-label" style="margin-bottom:0">Últimas partidas</p>
      <button class="btn-action btn-action-sm" onclick="openHistoryModal()">Ver tudo</button>
    </div>
    <ul id="history" class="history-list" style="margin-top:10px">
      <li class="empty-msg">Nenhuma partida finalizada ainda.</li>
    </ul>
  </section>

</div>

<!-- MODAL RODADA -->
<div class="modal-overlay hidden" id="round-overlay">
  <div class="modal">
    <p class="modal-round-title" id="round-modal-title">Rodada 1</p>
    <p class="modal-round-sub">Preencha os pontos de cada dupla</p>
    <div id="round-modal-inputs"></div>
    <div class="modal-divider"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeRoundModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarRodada()">✔ Confirmar</button>
    </div>
  </div>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/canastra-app/sw.js').catch(() => {});
    });
  }
</script>
<script src="script.js"></script>
</body>
</html>
